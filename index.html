      }
      // zone rule
      if(isHerb && !kOnBed){
        flash(entry.name + ' only grows in a raised bed');
        return;
      }
      if(!isHerb && kOnBed){
        flash('Only herbs grow in a raised bed');
        return;
      }
    }

    const seq = STAGES[entry.cat];
    const plant = {
      kind: 'plant',
      entry, seq, stage:0, t, keys:t.keys,
      onBed,
      grow:0, perStage: 2.2 + Math.random()*1.4,  // arcade-fast: seconds per stage
      group:new THREE.Group(), mesh:null, ring:null, ripe:false
    };
    // raised bed plants sit at the top of the soil (soil top ~0.93 with shorter bed)
    plant.group.position.set(t.cx, onBed ? 0.88 : 0.3, t.cz);
    // a 2x2 footprint plant (trees) is scaled up to fill its larger square
    plant.footScale = entry.foot>1 ? 1.7 : 1.0;
    world.add(plant.group);
    setPlantStage(plant, 0);
    if(!onBed) fillArea(t.keys, plant);   // on a bed, the bed already owns the tile
    plants.push(plant);
    flash('Planted '+entry.name);
  }

  // ---------- Build / place a building or fence (Phase 3) ----------
  const placed = [];   // all placed objects (plants live in `plants` too, but `placed` covers both)

  function buildHere(){
    const b = BUILDINGS[selectedBuild];
    if(!b.owned){ flash('You don\u2019t own '+b.name+' yet'); return; }
    const fp = effectiveFootprint(b);
    const t = placementAt(player.position.x, player.position.z, fp.w, fp.h);
    if(!t){ flash('Need a clear '+fp.w+'×'+fp.h+' space on the soil'); return; }
    if(!areaFree(t.keys)){
      flash(fp.w>1 ? 'That '+fp.w+'×'+fp.h+' space is blocked' : 'That tile is taken');
      return;
    }

    const obj = {
      kind: b.kind,                 // 'decor' | 'build' | 'fence' | 'bed'
      entry: b, t, keys:t.keys,
      group: new THREE.Group(),
      mesh:  null,
      rotY:  buildingRotation * Math.PI/2,
    };
    obj.group.position.set(t.cx, 0.3, t.cz);
    world.add(obj.group);

    if(b.kind==='fence'){
      obj.mesh = buildFenceMesh(fenceConnectionsAt(t.col, t.row));
      obj.group.add(obj.mesh);
      obj.group.rotation.y = obj.rotY;
      fillArea(t.keys, obj);
      placed.push(obj);
      // refresh this fence and all fence neighbours so the whole run re-links
      const touched = new Set();
      touched.add(t.col+','+t.row);
      [[t.col,t.row-1],[t.col,t.row+1],[t.col+1,t.row],[t.col-1,t.row]].forEach(([c,r])=>{
        const k = c+','+r;
        if(occupied[k] && occupied[k].kind==='fence') touched.add(k);
      });
      touched.forEach(k=>{
        const o = occupied[k];
        if(!o) return;
        if(o.mesh){ o.group.remove(o.mesh); }
        const [c,r] = k.split(',').map(Number);
        o.mesh = buildFenceMesh(fenceConnectionsAt(c,r));
        o.group.add(o.mesh);
      });
      flash('Fence placed');
    } else if(b.kind==='bed'){
      // Bed: rotation is baked into the mesh (b._placementRot), so do NOT
      // additionally rotate the group. Register the bed on every tile it covers.
      // The bed mesh already draws its own tile grid, so no separate overlay.
      b._placementRot = buildingRotation;
      obj.mesh = buildBuilding(b);
      obj.group.add(obj.mesh);
      fillArea(t.keys, obj);
      placed.push(obj);
      t.keys.forEach(k => { bedTiles.add(k); bedBed[k] = obj; });
      flash('Built a raised bed ('+fp.w+'×'+fp.h+')');
    } else {
      obj.mesh = buildBuilding(b);
      obj.group.add(obj.mesh);
      obj.group.rotation.y = obj.rotY;
      fillArea(t.keys, obj);
      placed.push(obj);
      flash(b.foot>1 ? 'Built '+b.name : 'Placed '+b.name);
    }
  }

  // Pick up a placed building/fence by standing on its tile and pressing F.
  // Plants (kind!=='building') are NOT affected here — harvestHere handles those.
  function removeHere(){
    const {col,row} = colRowAt(player.position.x, player.position.z);
    const o = occupied[col+','+row];
    if(!o || o.entry===undefined || (o.kind!=='decor' && o.kind!=='build' && o.kind!=='fence' && o.kind!=='bed')) return false;
    // remove the object + free its tiles, then re-link any fence neighbours
    world.remove(o.group);
    clearArea(o.keys);
    const idx = placed.indexOf(o);
    if(idx>=0) placed.splice(idx,1);
    // for fences: rebuild every fence neighbour so the run re-links without this tile
    if(o.kind==='fence'){
      const [c,r] = [col,row];
      [[c,r-1],[c,r+1],[c+1,r],[c-1,r]].forEach(([nc,nr])=>{
        const k = nc+','+nr;
        const no = occupied[k];
        if(!no || no.kind!=='fence') return;
        if(no.mesh){ no.group.remove(no.mesh); }
        no.mesh = buildFenceMesh(fenceConnectionsAt(nc,nr));
        no.group.add(no.mesh);
      });
    }
    // for beds: unregister bed tiles + any herbs sitting on the bed
    if(o.kind==='bed'){
      o.keys.forEach(k => { bedTiles.delete(k); delete bedBed[k]; });
      if(o.grid) world.remove(o.grid);
      const onBed = plants.filter(p => p.onBed && p.keys.some(k => o.keys.includes(k)));
      for(const p of onBed){
        world.remove(p.group);
        clearArea(p.keys);   // safe: plant.onBed means it never wrote to occupied
        const pi = plants.indexOf(p);
        if(pi>=0) plants.splice(pi,1);
        flash(p.entry.name + ' lifted with the bed');
      }
    }
    flash('Picked up '+o.entry.name);
    exitBuildMode();   // clear any lingering build ghost
    return true;
  }

  function setPlantStage(plant, idx){
    plant.stage = idx;
    if(plant.mesh){ plant.group.remove(plant.mesh); }
    const stageName = plant.seq[idx];
    plant.mesh = buildStage(plant.entry, stageName);
    // pop-in: start small, grow toward the plant's full (footprint-aware) scale
    plant.mesh.scale.setScalar(0.6*plant.footScale);
    plant.group.add(plant.mesh);
    const last = idx===plant.seq.length-1;
    plant.ripe = last;
    if(last && !plant.ring){
      plant.ring = makeRing(plant.footScale);
      plant.group.add(plant.ring);
    }
  }

  function harvestHere(){
    const {col,row}=colRowAt(player.position.x, player.position.z);
    if(!isPlantable(col,row)){ flash('Nothing here to harvest'); return; }
    const key = col+','+row;
    // Plant on regular soil lives in occupied; plant on a bed lives only in plants[].
    let plant = occupied[key];
    if(!plant || plant.kind !== 'plant'){
      plant = plants.find(p => p.keys.includes(key));
    }
    if(!plant){ flash('Nothing here to harvest'); return; }
    if(!plant.ripe){ flash(plant.entry.name+' is still growing'); return; }

    const isTree = plant.entry.cat === 'ftree' || plant.entry.cat === 'tree';

    // yield: produce item named after the plant (ftree yields the fruit, not the tree)
    const yieldName = plant.entry.cat === 'ftree'
      ? plant.entry.name.replace(' Tree','')
      : plant.entry.name;
    addToBasket(yieldName);
    totalHarvested++;

    if(isTree){
      // The TREE stays — we only pick its fruit/buds. Reset it to the bare
      // 'mature' stage so the fruit (or oak buds) regrows over time.
      const matureIdx = plant.seq.indexOf('mature');
      flash('Picked '+yieldName+' — the tree will regrow');
      // remove the ripe ring; setPlantStage will re-add one when ripe again
      if(plant.ring){ plant.group.remove(plant.ring); plant.ring=null; }
      setPlantStage(plant, matureIdx >= 0 ? matureIdx : 1);
      plant.grow = 0;
      exitBuildMode();
      renderLibrary();
      return;
    }

    flash('Harvested '+plant.entry.name);
    // remove plant and free ALL tiles it covered
    world.remove(plant.group);
    if(!plant.onBed) clearArea(plant.keys);   // bed plants never wrote to occupied
    plants.splice(plants.indexOf(plant),1);
    exitBuildMode();   // any non-build action clears a lingering ghost
    renderLibrary();   // a harvest may reveal a milestone seed / afford a buy
  }

  // ---------- Dig up a grass tile (Phase 4) ----------
  // B key on grass turns it into plantable soil. Each dig adds a soil patch
  // mesh, registers the tile in digTiles, and the placement system accepts it.
  function digHere(){
    const {col,row} = colRowAt(player.position.x, player.position.z);
    const key = col+','+row;
    if(inPlot(col,row)){ flash('Already plantable — it\'s the plot'); return; }
    if(digTiles.has(key)){ flash('Already dug here'); return; }
    const isRiver = riverTiles.has(key);
    if(occupied[key] && !isRiver){ flash('Something is in the way'); return; }
    if(col < -digBounds || col > digBounds || row < -digBounds || row > digBounds){
      flash('Too close to the world edge'); return;
    }
    // tile centre + bounds in world space
    const half = PLOT/2;
    const cx = -half + (col + 0.5) * TILE;
    const cz = -half + (row + 0.5) * TILE;

    // hills & mountains are scenery — they can't be farmed
    for(const mz of mountainZones){
      if(Math.hypot(cx - mz.x, cz - mz.z) < mz.r){
        flash('The rocky ground here can\'t be farmed'); return;
      }
    }

    // ---- if this is a river tile, drain it: remove the water panel first ----
    if(isRiver){
      const rt = riverTiles.get(key);
      if(rt && rt.mesh){ world.remove(rt.mesh); }
      riverTiles.delete(key);
    }

    // ---- clear any trees / rocks standing on this tile ----
    const x0 = cx - TILE/2, x1 = cx + TILE/2;
    const z0 = cz - TILE/2, z1 = cz + TILE/2;
    for(let i = envObstacles.length - 1; i >= 0; i--){
      const o = envObstacles[i];
      if(o.x >= x0 && o.x < x1 && o.z >= z0 && o.z < z1){
        o.parent.remove(o.mesh);
        envObstacles.splice(i, 1);
      }
    }

    // ---- soil patch that matches the central plot exactly ----
    // Same colour, same full-tile size (no inset gap), same surface height, so a
    // dug tile is visually indistinguishable from the starting plot.
    const soil = new THREE.Mesh(
      new THREE.BoxGeometry(TILE, 0.5, TILE),
      vmat(0x5a4329)
    );
    soil.position.set(cx, 0.05, cz);   // top surface at y=0.30, same as the plot
    soil.receiveShadow = true;
    world.add(soil);

    // matching grid lines on top (same colours/height as the plot's GridHelper)
    const dGrid = new THREE.GridHelper(TILE, 1, 0x8a6a3a, 0x6b5128);
    dGrid.position.set(cx, 0.31, cz);
    dGrid.material.opacity = 0.4; dGrid.material.transparent = true;
    world.add(dGrid);

    digMeshes[key] = soil;
    digTiles.add(key);
    exitBuildMode();   // clear any lingering build ghost
    lastPreviewKey = ''; // force preview/inventory to re-evaluate this now-plantable tile
    flash(isRiver ? 'Drained the river into farmland' : 'Dug a soil patch ('+(col)+','+(row)+')');
  }

  // ---------- Basket / inventory ----------
  const basket = {};
  function refreshBasket(){
    const list = Object.entries(basket).map(([k,v])=>k+' ×'+v).join('<br>');
    document.getElementById('basketList').innerHTML = list||'empty';
    // keep the trade panel buttons in sync if it's open
    if(typeof tradeModal!=='undefined' && tradeModal && tradeModal.style.display==='flex') renderTradePanel();
  }
  function addToBasket(name){
    basket[name] = (basket[name]||0)+1;
    refreshBasket();
  }

  // ---------- Trade post (Phase 4) ----------
  // Recipe-based trades: bring specific produce, get a rare seed or building.
  // rewardKind: 'seed' or 'building'; rewardIdx is the index in that catalog.
  // Note: Apple Tree is intentionally buildable from common produce so the
  // player isn't gated behind already having apples. Cherry Tree then needs
  // apples; Pagoda/Koi sit at the top of the progression.
  const TRADES = [
    { name:'Pumpkin Seed', needs:{Tomato:2, Carrot:1},              rewardKind:'seed',     rewardIdx:5,  hint:'hearty autumn vine' },
    { name:'Lavender Seed', needs:{Marigold:3, Bluebell:2},          rewardKind:'seed',     rewardIdx:6,  hint:'fragrant purple bloom' },
    { name:'Apple Tree',   needs:{Tomato:4, Carrot:2, Marigold:1},  rewardKind:'seed',     rewardIdx:7,  hint:'a small fruit tree' },
    { name:'Cherry Tree',  needs:{Apple:3, Honey:2},                rewardKind:'seed',     rewardIdx:8,  hint:'pink blossoms, loves honey' },
    { name:'Oak Sapling',  needs:{Carrot:4, Tomato:3, Basil:2},     rewardKind:'seed',     rewardIdx:9,  hint:'a slow, sturdy oak' },
    { name:'Garden Bench', needs:{Tomato:3},                        rewardKind:'building', rewardIdx:7,  hint:'a weathered wooden bench' },
    { name:'Pagoda',       needs:{Apple:5, Tomato:5, Carrot:3},     rewardKind:'building', rewardIdx:8,  hint:'a tall tiered pavilion' },
    { name:'Koi Pond',     needs:{Apple:5, Cherry:3, Honey:4},      rewardKind:'building', rewardIdx:9,  hint:'a sunken pool with koi' },
  ];

  function canAffordTrade(t){
    for(const [item,qty] of Object.entries(t.needs)){
      if((basket[item]||0) < qty) return false;
    }
    return true;
  }
  function describeMissing(t){
    const miss = [];
    for(const [item,qty] of Object.entries(t.needs)){
      const have = basket[item]||0;
      if(have < qty) miss.push((qty-have)+' '+item);
    }
    return miss.join(', ');
  }

  function doTrade(t){
    if(!canAffordTrade(t)){ flash('Not enough produce'); return; }
    for(const [item,qty] of Object.entries(t.needs)){
      basket[item] -= qty;
      if(basket[item] <= 0) delete basket[item];
    }
    refreshBasket();
    if(t.rewardKind === 'seed'){
      const c = CATALOG[t.rewardIdx];
      c.owned = true; c.revealed = true;
      flash('Traded for '+c.name+' seed');
    } else {
      const b = BUILDINGS[t.rewardIdx];
      b.owned = true; b.revealed = true;
      flash('Traded for '+b.name);
    }
    renderLibrary();
    renderTradePanel();
  }

  // Look up the icon for a basket item name. Try exact match first (e.g.
  // "Tomato"), then try + " Tree" (so "Apple" resolves to the Apple Tree icon).
  function iconForItem(name){
    let c = CATALOG.find(c => c.name === name);
    if(c && c.icon) return c.icon;
    c = CATALOG.find(c => c.name === name + ' Tree');
    if(c && c.icon) return c.icon;
    return null;
  }

  function makeIconBox(url, fallback, sizePx){
    const el = document.createElement('div');
    el.style.cssText = `width:${sizePx}px;height:${sizePx}px;flex:0 0 auto;border-radius:6px;border:1px solid rgba(217,178,90,0.4);background:rgba(0,0,0,0.28);background-size:contain;background-repeat:no-repeat;background-position:center;`;
    if(url) el.style.backgroundImage = 'url(' + url + ')';
    else if(fallback !== undefined) el.style.background = '#' + fallback.toString(16).padStart(6,'0');
    return el;
  }

  function renderTradePanel(){
    const list = document.getElementById('tradeList');
    list.innerHTML = '';
    TRADES.forEach(t=>{
      const card = document.createElement('div');
      card.style.cssText = 'padding:12px 14px;border-radius:8px;background:rgba(0,0,0,0.32);border:1px solid rgba(217,178,90,0.22);';

      // --- Top row: reward on the LEFT, cost column on the RIGHT ---
      const top = document.createElement('div');
      top.style.cssText = 'display:flex;gap:16px;align-items:flex-start;justify-content:space-between;';

      // Left side: reward icon + name + hint
      const left = document.createElement('div');
      left.style.cssText = 'flex:0 0 auto;display:flex;align-items:center;gap:11px;max-width:55%;';
      const rewardObj = t.rewardKind === 'seed' ? CATALOG[t.rewardIdx] : BUILDINGS[t.rewardIdx];
      const rIcon = makeIconBox(rewardObj.icon, rewardObj.swatch, 44);
      left.appendChild(rIcon);
      const titleWrap = document.createElement('div');
      titleWrap.innerHTML =
        '<div style="color:var(--gold-soft);font-size:13px;letter-spacing:1px;">'+t.name+'</div>'+
        '<div style="color:var(--gold);opacity:.55;font-size:10px;letter-spacing:1px;margin-top:2px;">'+t.hint+'</div>';
      left.appendChild(titleWrap);
      top.appendChild(left);

      // Right side: cost stacked in a vertical column
      const right = document.createElement('div');
      right.style.cssText = 'flex:0 0 auto;display:flex;flex-direction:column;gap:5px;align-items:flex-end;';
      const costHead = document.createElement('div');
      costHead.style.cssText = 'color:var(--gold);opacity:.55;font-size:9px;letter-spacing:2px;margin-bottom:2px;';
      costHead.textContent = 'COST';
      right.appendChild(costHead);
      Object.entries(t.needs).forEach(([item,qty])=>{
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:7px;padding:2px 8px;border-radius:14px;background:rgba(217,178,90,0.08);border:1px solid rgba(217,178,90,0.18);';
        const ic = makeIconBox(iconForItem(item), undefined, 18);
        row.appendChild(ic);
        const have = basket[item]||0;
        const lbl = document.createElement('span');
        const enough = have >= qty;
        lbl.style.cssText = 'color:'+(enough?'var(--gold-soft)':'#8a7a55')+';font-size:11px;letter-spacing:1px;';
        lbl.textContent = qty + ' \u00d7 ' + item + (enough ? '' : '  ('+have+')');
        row.appendChild(lbl);
        right.appendChild(row);
      });
      top.appendChild(right);

      card.appendChild(top);

      // --- Trade button (full width under the row) ---
      const btn = document.createElement('div');
      const ok = canAffordTrade(t);
      btn.style.cssText = 'margin-top:10px;padding:7px 12px;display:block;text-align:center;border-radius:6px;font-size:11px;letter-spacing:2px;pointer-events:auto;'+
        (ok
          ? 'background:rgba(217,178,90,0.24);color:var(--gold-soft);border:1px solid rgba(217,178,90,0.55);cursor:pointer;'
          : 'background:rgba(60,50,30,0.5);color:#8a7a55;border:1px solid rgba(217,178,90,0.18);cursor:not-allowed;');
      btn.textContent = ok ? 'TRADE' : 'NEED ' + describeMissing(t);
      if(ok) btn.onclick = ()=> doTrade(t);
      card.appendChild(btn);

      list.appendChild(card);
    });
  }

  // modal open/close + T key toggle
  const tradeModal = document.getElementById('tradeModal');
  function setTradeOpen(open){
    tradeModal.style.display = open ? 'flex' : 'none';
    if(open) renderTradePanel();
  }
  document.getElementById('tradeBtn').onclick = ()=> setTradeOpen(true);
  document.getElementById('tradeClose').onclick = ()=> setTradeOpen(false);
  tradeModal.addEventListener('click', e=>{ if(e.target===tradeModal) setTradeOpen(false); });

  // ---------- transient prompt text ----------
  let promptTimer=0;
  function flash(msg){
    const el=document.getElementById('prompt');
    el.textContent=msg; el.style.display='block'; promptTimer=2;
  }
  function clearPrompt(){
    promptTimer=0;
    document.getElementById('prompt').style.display='none';
  }

  // two-step removal: first Space asks, second Space (on the same tile) confirms.
  // Walking off the tile cancels. pendingRemove holds the object awaiting confirm,
  // and pendingRemoveKey the tile it's on (so we can detect walking away).
  let pendingRemove = null;
  let pendingRemoveKey = null;

  // ---------- Single contextual action (Space) ----------
  // One button does the sensible thing for where the player stands:
  //   1. placing a building from the library  -> build it
  //   2. standing on a ripe plant             -> harvest it
  //   3. standing on a placed building/decor   -> pick it up
  //   4. standing on plantable soil            -> plant the selected seed
  //   5. standing on bare grass (diggable)     -> dig it into soil
  function primaryAction(){
    const {col,row} = colRowAt(player.position.x, player.position.z);
    const key = col+','+row;

    // Find a plant on this tile (soil plants live in occupied; bed plants in plants[]).
    let plant = occupied[key];
    if(!plant || plant.kind !== 'plant') plant = plants.find(p => p.keys.includes(key));
    const ripePlantHere = plant && plant.kind==='plant' && plant.ripe;

    // 0. A ripe plant under our feet is always harvestable — even in build mode,
    //    so harvesting works right after placing a building. (Fixes "tile is taken".)
    if(ripePlantHere){ pendingRemove=null; harvestHere(); return; }

    // 1. If we're confirming a removal, a second Space confirms it.
    if(pendingRemove){
      const stillThere = occupied[key]===pendingRemove;
      pendingRemove = null; pendingRemoveKey = null; clearPrompt();
      if(stillThere){ removeHere(); }
      return;
    }

    // 2. An existing building/decor/fence/bed under our feet means the player
    //    wants to REMOVE it — this takes priority over placing more (so you can
    //    delete right after building). EXCEPTION: a bed with an herb selected is
    //    a planting surface, not a removal target.
    const occ = occupied[key];
    const selEntry = CATALOG[selectedSeed];
    const wantPlantOnBed = occ && occ.kind==='bed' && selEntry && selEntry.cat==='herb';
    const removableHere = occ && occ.entry!==undefined && !wantPlantOnBed &&
       (occ.kind==='decor'||occ.kind==='build'||occ.kind==='fence'||occ.kind==='bed');
    if(removableHere){
      pendingRemove = occ;
      pendingRemoveKey = key;
      const el=document.getElementById('prompt');
      el.textContent='Remove '+occ.entry.name+'? Space to confirm'; el.style.display='block';
      promptTimer = 999;   // stays until confirmed or cancelled by walking away
      return;
    }

    // 3. otherwise, explicit build intent places another item
    if(placingBuilding){ buildHere(); return; }

    // 4. a growing (not-yet-ripe) plant -> tell the player it's still growing
    if(plant && plant.kind==='plant'){ flash(plant.entry.name+' is still growing'); return; }

    // 5. plantable soil (plot or dug tile) OR a bed with an herb -> plant
    if(isPlantable(col,row) || wantPlantOnBed){ plantHere(); return; }

    // 6. bare grass within dig range -> dig
    digHere();
  }

  // keys for the single contextual action
  addEventListener('keydown',e=>{
    if(e.code==='Space'){
      e.preventDefault();
      primaryAction();
    }
  });

  addEventListener('resize',()=>{setupOrtho();renderer.setSize(innerWidth,innerHeight);});

  /* ============================================================
     WILDLIFE SYSTEM
     Small voxel creatures that wander into the grove on their own.

       squirrel / deer : pests — walk to a ripe veggie or fruit and eat it
                         (the plant is destroyed). A reason to fence things in.
       bird            : visits a Bird Bath, hops/bathes, then flies off (nice)
       bee / butterfly : drawn to flowers and bee hives; flutter around (ambiance)

     Each critter is a little state machine:
       'arrive' -> move toward a target
       'act'    -> do its thing at the target (eat / bathe / flutter)
       'leave'  -> walk back off the map, then despawn
     ============================================================ */
  const critters = [];                 // active creatures
  const CRITTER_CAP = 14;              // never spawn more than this many at once

  // --- build simple voxel bodies for each animal ---
  function buildCritter(type){
    const g = new THREE.Group();
    if(type==='squirrel'){
      vox(0x8a5a2a, 0.28,0.26,0.42, 0,0.18,0, g);          // body
      vox(0x8a5a2a, 0.22,0.22,0.22, 0,0.34,0.18, g);       // head
      vox(0x6a4520, 0.12,0.5,0.32, 0,0.4,-0.28, g);        // bushy tail
      vox(0x2a1a0a, 0.05,0.05,0.05, 0.06,0.4,0.30, g);     // eye
    } else if(type==='deer'){
      vox(0xa57848, 0.42,0.46,0.8, 0,0.6,0, g);            // body
      vox(0x8a6038, 0.22,0.5,0.22, 0,0.3,0, g);            // (filler) neck base
      vox(0xa57848, 0.26,0.3,0.3, 0,0.95,0.4, g);          // head
      vox(0x2a1a0e, 0.05,0.05,0.05, 0.08,1.0,0.54, g);     // eye R
      vox(0x2a1a0e, 0.05,0.05,0.05, -0.08,1.0,0.54, g);    // eye L
      vox(0x6a4a2a, 0.1,0.5,0.1, -0.14,0.28,0.32, g);      // legs
      vox(0x6a4a2a, 0.1,0.5,0.1, 0.14,0.28,0.32, g);
      vox(0x6a4a2a, 0.1,0.5,0.1, -0.14,0.28,-0.32, g);
      vox(0x6a4a2a, 0.1,0.5,0.1, 0.14,0.28,-0.32, g);
      // ---- branched antlers (one rack per side) ----
      const ANT = 0xcdb98c;
      [-1, 1].forEach(s => {
        // main beam: angles up and back from the brow
        const beam = vox(ANT, 0.06,0.42,0.06, s*0.11, 1.28, 0.34, g);
        beam.rotation.z = s*0.35; beam.rotation.x = -0.3;
        // base pedicle
        vox(ANT, 0.07,0.12,0.07, s*0.1, 1.12, 0.36, g);
        // forward brow tine
        const t1 = vox(ANT, 0.05,0.2,0.05, s*0.16, 1.34, 0.46, g);
        t1.rotation.x = -0.9;
        // mid tine pointing up-out
        const t2 = vox(ANT, 0.05,0.22,0.05, s*0.27, 1.46, 0.28, g);
        t2.rotation.z = s*0.7;
        // top fork tine
        const t3 = vox(ANT, 0.05,0.2,0.05, s*0.2, 1.62, 0.2, g);
        t3.rotation.z = s*0.3; t3.rotation.x = -0.2;
      });
    } else if(type==='bird'){
      const bodyCol = [0x4a7ad0, 0xd05a4a, 0x4aa060, 0xe0a040][Math.random()*4|0];
      vox(bodyCol, 0.2,0.18,0.3, 0,0.1,0, g);             // body
      vox(bodyCol, 0.15,0.15,0.15, 0,0.22,0.16, g);       // head
      vox(0xf0e0d0, 0.12,0.1,0.1, 0,0.06,0.1, g);         // pale belly
      vox(0xe0a040, 0.05,0.05,0.1, 0,0.22,0.27, g);       // beak
      vox(0x2a2a2a, 0.04,0.04,0.04, 0.06,0.25,0.2, g);    // eye
      vox(bodyCol, 0.1,0.05,0.26, 0,0.1,-0.24, g);        // tail
      // two separate wings (pivoted groups) so they can flap
      const wingL = new THREE.Group();
      vox(bodyCol, 0.28,0.05,0.2, -0.14,0,0, wingL);
      wingL.position.set(-0.1,0.14,0); g.add(wingL);
      const wingR = new THREE.Group();
      vox(bodyCol, 0.28,0.05,0.2, 0.14,0,0, wingR);
      wingR.position.set(0.1,0.14,0); g.add(wingR);
      g.userData.wingL = wingL;
      g.userData.wingR = wingR;
    } else if(type==='bee'){
      vox(0xe0c040, 0.14,0.12,0.18, 0,0,0, g);             // body
      vox(0x2a2a2a, 0.15,0.13,0.05, 0,0,0.02, g);          // stripe
      vox(0xffffff, 0.18,0.02,0.12, 0,0.06,0, g);          // wings (flat)
    } else if(type==='bear'){
      const fur = 0x4a3528;
      vox(fur, 0.6,0.55,1.0, 0,0.5,0, g);                  // body
      vox(fur, 0.42,0.4,0.4, 0,0.78,0.6, g);               // head
      vox(0x2a1d14, 0.46,0.18,0.18, 0,0.7,0.82, g);        // snout/muzzle
      vox(fur, 0.16,0.16,0.1, -0.16,1.0,0.55, g);          // ear L
      vox(fur, 0.16,0.16,0.1, 0.16,1.0,0.55, g);           // ear R
      vox(0x1a120c, 0.06,0.06,0.06, -0.12,0.84,0.8, g);    // eye L
      vox(0x1a120c, 0.06,0.06,0.06, 0.12,0.84,0.8, g);     // eye R
      vox(0x2e2118, 0.16,0.4,0.16, -0.2,0.2,0.34, g);      // legs
      vox(0x2e2118, 0.16,0.4,0.16, 0.2,0.2,0.34, g);
      vox(0x2e2118, 0.16,0.4,0.16, -0.2,0.2,-0.34, g);
      vox(0x2e2118, 0.16,0.4,0.16, 0.2,0.2,-0.34, g);
      vox(fur, 0.18,0.18,0.18, 0,0.5,-0.56, g);            // tail/rump
    } else if(type==='fish'){
      const c = 0xc86a4a;
      vox(c, 0.12,0.16,0.42, 0,0,0, g);                    // body
      vox(0xe8a06a, 0.1,0.12,0.12, 0,0,0.26, g);           // head
      vox(c, 0.04,0.22,0.18, 0,0,-0.26, g);                // tail fin
      vox(0xe8c0a0, 0.18,0.03,0.1, 0,0.02,0, g);           // side fin
    }
    return g;
  }

  // a point on the forest ring, where ground critters enter/exit
  function edgePoint(){
    const a = Math.random()*Math.PI*2;
    const r = 26 + Math.random()*4;
    return new THREE.Vector3(Math.cos(a)*r, 0, Math.sin(a)*r);
  }

  // find a crop a pest wants to eat: tomatoes (veg), apples & cherries (ftree).
  // We include plants that are at least partly grown (stage>=1), not only fully
  // ripe ones — pests will happily nibble a developing crop, so they show up far
  // more reliably. Ripe crops are still preferred when available.
  function findEdiblePlant(){
    const eatable = plants.filter(p =>
      p.stage>=1 && (p.entry.cat==='veg' || p.entry.cat==='fruit' || p.entry.cat==='ftree')
    );
    if(!eatable.length) return null;
    const ripe = eatable.filter(p => p.ripe);
    const pool = ripe.length ? ripe : eatable;     // prefer ripe, else any growing
    return pool[Math.random()*pool.length|0];
  }
  // a gentle wander destination within the grove for a roaming bee
  function beeWanderPoint(near){
    // a fresh point somewhere over the grove interior (well inside the borders),
    // biased to actually move away from the current spot so bees never stall.
    const a = Math.random()*Math.PI*2;
    const r = 6 + Math.random()*10;
    return new THREE.Vector3(
      Math.max(-16, Math.min(16, Math.cos(a)*r)),
      1.6 + Math.random()*1.4,
      Math.max(-16, Math.min(16, Math.sin(a)*r))
    );
  }

  function findPlacedByName(name){
    const list = placed.filter(o => o.entry && o.entry.name===name);
    return list.length ? list[Math.random()*list.length|0] : null;
  }
  function findFlower(){
    const flowers = plants.filter(p => p.entry.cat==='flower' && p.stage>=1);
    return flowers.length ? flowers[Math.random()*flowers.length|0] : null;
  }
  // a random point on the (current) river, or null if the river is gone
  function riverPoint(){
    if(riverPoints.length===0) return null;
    // only count tiles still watered (not dug away)
    const live = riverPoints.filter(p => {
      const {col,row} = colRowAt(p.x, p.z);
      return riverTiles.has(col+','+row);
    });
    if(!live.length) return null;
    return live[Math.random()*live.length|0];
  }

  // pick up to `n` distinct flowers for a bee's foraging route
  function pickFlowers(n){
    const all = plants.filter(p => p.entry.cat==='flower' && p.stage>=1);
    const chosen = [];
    while(chosen.length < n && all.length){
      const idx = Math.random()*all.length|0;
      chosen.push(all.splice(idx,1)[0]);   // remove so we don't pick it twice
    }
    return chosen;
  }

  function spawnCritter(type, target){
    if(critters.length >= CRITTER_CAP) return;
    const mesh = buildCritter(type);
    const flying = (type==='bird'||type==='bee'||type==='butterfly');
    const start = flying
      ? edgePoint().setY(type==='bird' ? 6 : 2.5)
      : edgePoint();
    mesh.position.copy(start);
    scene.add(mesh);

    const c = {
      type, mesh, target,
      state:'arrive',
      flying,
      speed: type==='deer' ? 2.2 : type==='squirrel' ? 3.2 : type==='bird' ? 4 : type==='bear' ? 1.8 : 2.6,
      timer: 0,                 // counts time spent in the 'act' state
      actDur: type==='bird' ? 5 : type==='bear' ? 8 : (flying ? 9999 : 2.5),
      bob: Math.random()*Math.PI*2,
      home: start.clone(),      // where it leaves toward
    };

    // BEARS amble in to a river spot and fish for a while, then leave.
    if(type==='bear'){
      const rp = (target && target.x!==undefined) ? target : riverPoint();
      c.riverDest = rp ? new THREE.Vector3(rp.x, 0, rp.z) : null;
    }

    // BEES and BUTTERFLIES are permanent grove residents using one shared
    // behaviour (updateBee): roam freely, get drawn to flowers, never idle.
    // Bees also deliver pollen to a hive for honey; butterflies just flit about.
    if(type==='bee' || type==='butterfly'){
      // start somewhere over the grove interior, not way out at the edge
      mesh.position.set((Math.random()*2-1)*14, 1.8, (Math.random()*2-1)*14);
      c.pollen = 0;
      c.hive = null;
      c.beeState = 'roam';       // roam | toFlower | atFlower | toHive
      c.wander = beeWanderPoint(c.mesh.position);
      c.target = null;
      c.actDur = 1.6;            // brief pause gathering at a flower
      c.permanent = true;        // don't despawn at map edge
      c.speed = type==='bee' ? 3.2 : 2.6;
      c.makesHoney = (type==='bee');   // butterflies don't visit hives
    }

    critters.push(c);
  }

  // move a critter toward a 3D point; returns true when close enough
  const _tmpDir = new THREE.Vector3();
  function moveToward(c, point, dt){
    _tmpDir.copy(point).sub(c.mesh.position);
    if(c.flying){
      // keep flying height while approaching
    } else {
      _tmpDir.y = 0;
    }
    const dist = _tmpDir.length();
    if(dist < 0.4) return true;
    _tmpDir.normalize();
    c.mesh.position.addScaledVector(_tmpDir, c.speed*dt);
    // face travel direction
    c.mesh.rotation.y = Math.atan2(_tmpDir.x, _tmpDir.z);
    return false;
  }

  // is there a fence on the tile containing world point (x,z)?
  function tileHasFence(x, z){
    const half = PLOT/2;
    const col = Math.floor((x + half)/TILE);
    const row = Math.floor((z + half)/TILE);
    const o = occupied[col+','+row];
    return !!(o && o.kind==='fence');
  }

  // ground movement that refuses to step into a fenced tile. Returns:
  //   'reached' when within range, 'blocked' if a fence is in the way, else 'moving'
  const _gdir = new THREE.Vector3();
  function moveGround(c, point, dt){
    _gdir.copy(point).sub(c.mesh.position); _gdir.y = 0;
    const dist = _gdir.length();
    if(dist < 0.5) return 'reached';
    _gdir.normalize();
    const step = c.speed*dt;
    const nx = c.mesh.position.x + _gdir.x*step;
    const nz = c.mesh.position.z + _gdir.z*step;
    // would the next step land on a fenced tile we're not already standing on?
    if(tileHasFence(nx, nz) && !tileHasFence(c.mesh.position.x, c.mesh.position.z)){
      return 'blocked';
    }
    c.mesh.position.x = nx;
    c.mesh.position.z = nz;
    c.mesh.rotation.y = Math.atan2(_gdir.x, _gdir.z);
    return 'moving';
  }

  // chance-based spawning, checked a few times per second (not every frame).
  // This is fully PERSISTENT: every cycle it re-checks what's in the garden, so
  // as long as something attracts them, critters keep visiting from time to time.
  let spawnClock = 0;
  function maybeSpawn(dt, isDay){
    spawnClock += dt;
    if(spawnClock < 1.0) return;     // evaluate ~ once per second
    spawnClock = 0;
    if(!isDay) return;               // wildlife is active in daytime only
    if(critters.length >= CRITTER_CAP) return;

    // PESTS: squirrels/deer come for tomatoes, apples & cherries (growing or ripe)
    if(Math.random() < 0.224){
      const target = findEdiblePlant();
      if(target) spawnCritter(Math.random()<0.55 ? 'squirrel' : 'deer', target);
    }
    // BIRDS: visit whenever a bird bath exists
    if(Math.random() < 0.315){
      const bath = findPlacedByName('Bird Bath');
      if(bath) spawnCritter('bird', bath);
    }
    // BEES are permanent residents: keep a small population alive at all times,
    // independent of flowers or hives (they roam the grove regardless).
    const beeCount = critters.reduce((n,c)=> n + (c.type==='bee'?1:0), 0);
    const BEE_TARGET = 4;
    if(beeCount < BEE_TARGET && Math.random() < 0.5){
      spawnCritter('bee', null);
    }
    // BUTTERFLIES: a few flit around when flowers are present (same roam/flower
    // behaviour as bees, minus the hive). Capped so they don't accumulate.
    const flyCount = critters.reduce((n,c)=> n + (c.type==='butterfly'?1:0), 0);
    if(flyCount < 3 && findFlower() && Math.random() < 0.3){
      spawnCritter('butterfly', null);
    }
    // BEARS: occasionally amble to the river to fish (only if a river still exists)
    const bearCount = critters.reduce((n,c)=> n + (c.type==='bear'?1:0), 0);
    if(bearCount < 1 && Math.random() < 0.10 && riverPoint()){
      spawnCritter('bear', riverPoint());
    }
    // AMBIENT FISH: a salmon leaps from the river now and then, even with no bear
    if(Math.random() < 0.25 && riverPoint()){
      spawnFish();
    }
  }

  // resolve a critter target's current world position (it may have been removed)
  function targetPos(c){
    const t = c.target;
    if(!t) return null;
    // plants store a group; placed buildings store a group too
    if(t.group && t.group.parent) return t.group.position;
    return null;   // target gone (harvested / removed)
  }

  // Dedicated bee behaviour: a permanent grove resident that is ALWAYS moving.
  //   roam     -> drift to a wander point; if a flower exists, switch to toFlower
  //   toFlower -> fly to the flower
  //   atFlower -> circle briefly to gather pollen, then head to a hive (if any) or roam
  //   toHive   -> fly to the hive, deposit pollen -> honey, then roam again
  // helper: send a bee into roam mode with a fresh destination + brief cooldown
  function beeRoam(c, cooldown){
    c.beeState = 'roam';
    c.target = null;
    c.wander = beeWanderPoint(c.mesh.position);
    c.roamCooldown = cooldown || 0;   // seconds before it may chase a flower again
    c.scan = 0;
  }

  function updateBee(c, dt, now){
    c.bob += dt*4;
    const flap = Math.sin(now*0.02)*0.05;            // subtle vertical flutter

    if(c.beeState==='roam'){
      // drift toward the wander point; pick a new one when reached
      if(moveToward(c, c.wander, dt)){
        c.wander = beeWanderPoint(c.mesh.position);
      }
      c.mesh.position.y += flap;
      // count down the cooldown so a bee actually roams before re-foraging
      if(c.roamCooldown > 0){ c.roamCooldown -= dt; return; }
      // get attracted to a flower if one exists (checked occasionally)
      c.scan = (c.scan||0) + dt;
      if(c.scan > 0.8){
        c.scan = 0;
        const f = findFlower();
        if(f && Math.random() < 0.5){ c.target = f; c.beeState = 'toFlower'; }
      }
      return;
    }

    if(c.beeState==='toFlower'){
      const tp = targetPos(c);
      if(!tp){ beeRoam(c, 1.5); return; }   // flower gone -> roam a while
      const dest = _destTmp.set(tp.x, 1.3, tp.z);
      if(moveToward(c, dest, dt)){ c.beeState='atFlower'; c.timer=0; }
      return;
    }

    if(c.beeState==='atFlower'){
      const tp = targetPos(c);
      if(!tp){ beeRoam(c, 1.5); return; }   // flower harvested mid-visit -> roam
      c.timer += dt;
      // gentle circling drift around the flower (never perfectly still)
      const ang = c.bob*0.8;
      const r = 0.5 + Math.sin(c.bob*0.6)*0.18;
      c.mesh.position.x = tp.x + Math.cos(ang)*r;
      c.mesh.position.z = tp.z + Math.sin(ang)*r;
      c.mesh.position.y = 1.3 + Math.sin(c.bob)*0.15;
      if(c.timer >= c.actDur){
        c.pollen++;
        const hive = c.makesHoney ? findPlacedByName('Bee Hive') : null;
        if(hive){ c.hive = hive; c.target = hive; c.beeState='toHive'; }
        // no hive (or a butterfly): wander off for a couple seconds before
        // visiting a flower again, so it doesn't appear glued to one flower.
        else { beeRoam(c, 2.5); }
      }
      return;
    }

    if(c.beeState==='toHive'){
      const tp = targetPos(c);
      if(!tp){ beeRoam(c, 1.5); return; }   // hive removed
      const dest = _destTmp.set(tp.x, 1.4, tp.z);
      if(moveToward(c, dest, dt)){
        if(c.pollen > 0){ addToBasket('Honey'); flash('Your bee hive produced Honey! 🍯'); }
        c.pollen = 0;
        // head back out to the grove; a short roam first so it doesn't snap
        // straight back onto the same flower.
        beeRoam(c, 1.5);
      }
      return;
    }

    // any unknown state -> recover into roam
    beeRoam(c, 1.0);
  }

  // a salmon that leaps in an arc out of the river and splashes back
  const jumpingFish = [];
  function spawnFish(at){
    const rp = at || riverPoint();
    if(!rp) return;
    const f = buildCritter('fish');
    f.position.set(rp.x, 0.2, rp.z);
    scene.add(f);
    jumpingFish.push({ mesh:f, x:rp.x, z:rp.z, t:0, dur:0.9+Math.random()*0.3,
                       vx:(Math.random()-0.5)*1.2, vz:(Math.random()-0.5)*1.2 });
  }
  function updateFish(dt){
    for(let i=jumpingFish.length-1;i>=0;i--){
      const f=jumpingFish[i];
      f.t += dt;
      const u = f.t/f.dur;                 // 0..1 along the arc
      const peak = 1.6;
      f.mesh.position.x = f.x + f.vx*f.t;
      f.mesh.position.z = f.z + f.vz*f.t;
      f.mesh.position.y = 0.2 + Math.sin(u*Math.PI)*peak;   // up then down
      f.mesh.rotation.x = -Math.cos(u*Math.PI)*1.1;          // nose up then down
      f.mesh.rotation.y += dt*4;
      if(u>=1){ scene.remove(f.mesh); jumpingFish.splice(i,1); }
    }
  }

  // Bear: walk to a river spot, fish for a while (with occasional fish leaps and
  // a paw-swipe bob), then amble back off the map.
  const _bearTmp = new THREE.Vector3();
  function updateBear(c, dt, now){
    if(c.state==='arrive'){
      if(!c.riverDest){ c.state='leave'; return; }
      const res = moveGround(c, c.riverDest, dt);
      if(res==='reached'){ c.state='act'; c.timer=0; }
      else if(res==='blocked'){ c.state='leave'; }   // fenced off
      return;
    }
    if(c.state==='act'){
      c.timer += dt;
      // face the water, gentle fishing bob
      c.mesh.position.y = Math.abs(Math.sin(now*0.004))*0.08;
      c.fishClock = (c.fishClock||0) + dt;
      if(c.fishClock > 1.4){
        c.fishClock = 0;
        // a salmon leaps near the bear
        spawnFish({ x: c.riverDest.x + (Math.random()-0.5)*1.5,
                    z: c.riverDest.z + (Math.random()-0.5)*1.5 });
      }
      if(c.timer >= c.actDur){ c.state='leave'; }
      return;
    }
    if(c.state==='leave'){
      const gone = moveToward(c, c.home, dt);
      if(gone || c.mesh.position.distanceTo(player.position) > 60){
        scene.remove(c.mesh);
        const idx = critters.indexOf(c);
        if(idx>=0) critters.splice(idx,1);
      }
      return;
    }
  }

  function updateCritters(dt, now){
    for(let i=critters.length-1; i>=0; i--){
      const c = critters[i];

      // bees & butterflies share one dedicated behaviour (always moving)
      if(c.type==='bee' || c.type==='butterfly'){ updateBee(c, dt, now); continue; }

      // bears amble to the river, fish for a while, then leave
      if(c.type==='bear'){ updateBear(c, dt, now); continue; }

      const tp = targetPos(c);

      // gentle wing-bob for flyers (butterflies hover; birds land)
      if(c.flying && c.type!=='bird'){
        c.bob += dt*8;
        const baseY = (c.state==='act' && tp) ? 1.1 : 1.6;
        c.mesh.position.y = baseY + Math.sin(c.bob)*0.25;
      } else if(c.type==='bird'){
        c.bob += dt*8;
        // flap the wings — fast while flying, gentle while perched
        const wingL = c.mesh.userData.wingL, wingR = c.mesh.userData.wingR;
        if(wingL && wingR){
          const flapping = (c.state==='arrive' || c.state==='leave');
          const amp = flapping ? 0.9 : 0.25;
          const sp  = flapping ? 16 : 5;
          const a = Math.sin(now*0.001*sp)*amp;
          wingL.rotation.z =  a;
          wingR.rotation.z = -a;
        }
      }

      if(c.state==='arrive'){
        if(!tp){ c.state='leave'; continue; }
        const dest = _arriveDest(c, tp);
        // squirrels & deer can't cross fences — they bump and turn back
        if(c.type==='squirrel' || c.type==='deer'){
          const res = moveGround(c, dest, dt);
          if(res==='reached'){ c.state='act'; c.timer=0; }
          else if(res==='blocked'){
            flash('A '+c.type+' was kept out by a fence!');
            c.state='leave';
          }
        } else {
          if(moveToward(c, dest, dt)){ c.state='act'; c.timer=0; }
        }
      }
      else if(c.state==='act'){
        c.timer += dt;

        if(!tp && c.type!=='butterfly'){ c.state='leave'; continue; }
        // PEST eats the plant on arrival
        if((c.type==='squirrel'||c.type==='deer') && c.target && c.target.kind==='plant'){
          eatPlant(c.target);
          c.target=null;
          c.state='leave';
          continue;
        }
        // butterflies flutter around the flower
        if(tp && c.type==='butterfly'){
          const ang = c.bob;
          c.mesh.position.x = tp.x + Math.cos(ang)*0.7;
          c.mesh.position.z = tp.z + Math.sin(ang)*0.7;
        }
        if(c.timer >= c.actDur){ c.state='leave'; }
        // flyers without a target also eventually leave
        if(!tp && c.timer>3){ c.state='leave'; }
      }
      else if(c.state==='leave'){
        const goneHome = moveToward(c, c.home, dt);
        if(goneHome || c.mesh.position.distanceTo(player.position) > 60){
          scene.remove(c.mesh);
          critters.splice(i,1);
        }
      }
    }
  }

  // where exactly to stand relative to the target
  const _destTmp = new THREE.Vector3();
  function _arriveDest(c, tp){
    if(c.type==='bird'){
      // land on the bird bath bowl
      return _destTmp.set(tp.x, 0.9, tp.z);
    }
    if(c.flying){
      return _destTmp.set(tp.x, 1.6, tp.z);
    }
    return _destTmp.set(tp.x, 0, tp.z);
  }

  // a pest eats a plant. For trees, only the produce is taken — the tree stays
  // and regrows. Other plants are removed entirely.
  function eatPlant(plant){
    const idx = plants.indexOf(plant);
    if(idx<0) return;                      // already gone
    const isTree = plant.entry.cat === 'ftree' || plant.entry.cat === 'tree';
    if(isTree){
      const matureIdx = plant.seq.indexOf('mature');
      if(plant.ring){ plant.group.remove(plant.ring); plant.ring=null; }
      setPlantStage(plant, matureIdx >= 0 ? matureIdx : 1);
      plant.grow = 0;
      flash('A critter ate the fruit off your '+plant.entry.name+'!');
      return;
    }
    world.remove(plant.group);
    if(!plant.onBed) clearArea(plant.keys);
    plants.splice(idx,1);
    flash('A critter ate your '+plant.entry.name+'!');
  }

  // ---------- Loop ----------
  const clock=new THREE.Clock();
  let walkPhase=0, camAngle=isoAngle;

  // --- hoisted loop constants (avoid per-frame allocation) ---
  const DAY_BG   = new THREE.Color(0x7db8e8);   // bright daytime blue sky
  const NIGHT_BG = new THREE.Color(0x0a1430);   // deep blue night sky (not black)
  const DAY_FOG  = new THREE.Color(0xb8d4e8);   // pale blue haze by day (matches sky)
  const NIGHT_FOG= new THREE.Color(0x26344e);   // muted blue-grey night air — keeps scene readable
  let lastPhaseLabel = '';        // only write the time HUD when it changes
  const TMP_PROJ = new THREE.Vector3();   // reused for prompt projection

  function tick(){
    const dt=Math.min(clock.getDelta(),0.05);
    const now=performance.now();   // cache once; reused by bob animations

    // movement relative to current iso view angle
    const speed=(keys['ShiftLeft']||keys['ShiftRight'])?10.5:6.0;
    let mx=0,mz=0;
    if(keys['KeyW'])mz-=1; if(keys['KeyS'])mz+=1;
    if(keys['KeyA'])mx-=1; if(keys['KeyD'])mx+=1;
    if(mx||mz){
      const len=Math.hypot(mx,mz);mx/=len;mz/=len;
      // build movement from the camera's on-screen axes:
      //   forward = direction the camera looks (W goes up-screen)
      //   right   = perpendicular (D goes screen-right)
      const fwdX=-Math.sin(camAngle), fwdZ=-Math.cos(camAngle);
      const rightX=Math.cos(camAngle), rightZ=-Math.sin(camAngle);
      const dx = mx*rightX + (-mz)*fwdX;
      const dz = mx*rightZ + (-mz)*fwdZ;
      player.position.x+=dx*speed*dt; player.position.z+=dz*speed*dt;
      const lim=28;
      player.position.x=Math.max(-lim,Math.min(lim,player.position.x));
      player.position.z=Math.max(-lim,Math.min(lim,player.position.z));
      player.rotation.y=Math.atan2(dx,dz);
      walkPhase+=dt*speed*1.6;
      legL.rotation.x=Math.sin(walkPhase)*0.6;
      legR.rotation.x=-Math.sin(walkPhase)*0.6;
    } else { legL.rotation.x*=0.8; legR.rotation.x*=0.8; }

    // --- inventory pops up when standing on ANY plantable soil ---
    // (the central plot OR a tile the player has dug up). isPlantable covers both.
    const pcol = Math.floor((player.position.x + PLOT/2)/TILE);
    const prow = Math.floor((player.position.z + PLOT/2)/TILE);
    const nowOnPlot = isPlantable(pcol, prow);
    if(nowOnPlot!==onPlot){
      onPlot=nowOnPlot;
      if(onPlot) renderLibrary();
      setInventoryVisible(onPlot);
    }
    // live footprint highlight follows the player while on plantable soil.
    // Only recompute when something it depends on actually changed
    // (player tile, selection, build/plant mode, or rotation).
    const previewKey = pcol+','+prow+'|'+(placingBuilding?'B'+selectedBuild:'P'+selectedSeed)+'|'+buildingRotation+'|'+(onPlot?1:0);
    if(previewKey !== lastPreviewKey){
      lastPreviewKey = previewKey;
      updateFootprintPreview();
    }

    // smooth the 90° view rotations
    camAngle+=(isoAngle-camAngle)*Math.min(1,dt*8);

    // isometric camera: fixed pitch, orbiting yaw, orthographic
    const dist=40, pitch=Math.atan(1/Math.SQRT2); // ~35.26° classic iso
    const cx=player.position.x+Math.sin(camAngle)*Math.cos(pitch)*dist;
    const cz=player.position.z+Math.cos(camAngle)*Math.cos(pitch)*dist;
    const cy=Math.sin(pitch)*dist;
    camera.position.set(cx,cy,cz);
    camera.lookAt(player.position.x,1,player.position.z);

    // ---------- Day/night cycle (Phase 4) ----------
    // 2x slower than the original (was 0.01, now 0.005). Sun rises east,
    // arcs across, sets west. Moon arcs the opposite way.
    dayTime += dt * 0.005;
    if(dayTime >= 1){ dayTime = 0; day++; document.getElementById('dayVal').textContent = day; rollWeather(); }
    const phaseLabel = phaseName(dayTime);
    if(phaseLabel !== lastPhaseLabel){
      document.getElementById('timeVal').textContent = phaseLabel;
      lastPhaseLabel = phaseLabel;
    }

    const sunAngle  = (dayTime - 0.25) * Math.PI * 2;   // for the visible sun disc only
    const moonAngle = (dayTime + 0.25) * Math.PI * 2;   // opposite cadence
    const sunX = Math.cos(sunAngle),  sunY = Math.sin(sunAngle);
    const moonX = Math.cos(moonAngle), moonY = Math.sin(moonAngle);
    const sunFactor  = Math.max(0, sunY);               // 0 at/below horizon, 1 at noon
    const moonFactor = Math.max(0, moonY);
    // nightFactor drives ONLY the sky backdrop / stars — not the scene lighting.
    const nightFactor = 1 - sunFactor;

    // --- Scene lighting stays constant so the grove is always clearly visible. ---
    // The key light is fixed high overhead (weather still modulates its strength),
    // and ambient/hemi hold steady. Day/night changes the SKY, not the lights.
    cur.sun  += (tgt.sun  - cur.sun ) * dt * 1.5;
    cur.hemi += (tgt.hemi - cur.hemi) * dt * 1.5;

    sun.position.set(player.position.x + 16, 40, player.position.z + 14); // fixed overhead
    sun.target.position.set(player.position.x, 0, player.position.z);
    sun.intensity     = cur.sun;          // steady; no sunFactor dimming
    sun.castShadow    = true;             // consistent shadows day and night
    ambient.intensity = 0.6;              // steady fill
    hemi.intensity    = cur.hemi;         // steady sky fill
    hemi.color.setRGB(0.61, 0.72, 0.57);  // constant warm-green hemi, no night tint

    // --- The moon is purely decorative now (no longer a light source). ---
    // It still rises and arcs across the night sky. The directional moon light
    // is kept off so it can't darken or recolour the scene.
    moon.intensity  = 0.0;
    moon.castShadow = false;
    moon.position.set(player.position.x + moonX * 60, moonY * 60 + 5, player.position.z + 14);

    // visible celestial bodies: sun disc by day, moon disc by night
    sunMesh.position.set(player.position.x + sunX * 60, sunY * 60 + 5, player.position.z + 14);
    sunMesh.visible  = sunFactor  > 0.02;
    sunHalo.position.copy(sunMesh.position);  sunHalo.visible  = sunMesh.visible;
    moonMesh.position.copy(moon.position); moonMesh.visible = moonFactor > 0.02;
    moonHalo.position.copy(moon.position); moonHalo.visible = moonMesh.visible;

    // stars fade in as the sky darkens. The plane is parented to the camera,
    // so it follows the view automatically — we only adjust its opacity here.
    stars.material.opacity = Math.max(0, (nightFactor - 0.2) * 1.6);
    stars.visible = stars.material.opacity > 0.02;

    // clouds drift across the sky and fade out at night
    clouds.position.x = player.position.x; clouds.position.z = player.position.z;
    cloudMat.opacity = 0.92 * sunFactor;        // gone at night, full by day
    clouds.visible = cloudMat.opacity > 0.03;
    if(clouds.visible){
      for(const c of clouds.children){
        c.position.x += c.userData.drift * dt;
        if(c.position.x > 50) c.position.x = -50;   // wrap around
      }
    }

    // background & fog transition day -> night (this is the visible change)
    bgColor.copy(DAY_BG).lerp(NIGHT_BG, nightFactor);
    scene.background = bgColor;
    fogColor.copy(DAY_FOG).lerp(NIGHT_FOG, nightFactor);
    scene.fog.color = fogColor;
    scene.fog.near += (tgt.fogNear - scene.fog.near) * dt * 1.5;
    scene.fog.far  += (tgt.fogFar  - scene.fog.far ) * dt * 1.5;

    // --- Stone Lantern illumination: glows from dusk to dawn ---
    // nightFactor is ~0 in daylight and ~1 at full night. We ramp the lantern on
    // once it starts getting dark, so the bulb glows and casts a warm pool of light.
    const lanternGlow = Math.max(0, (nightFactor - 0.35)) / 0.65;  // 0 by day, 1 deep night
    const flick = 1 + Math.sin(now*0.012)*0.06;
    for(const o of placed){
      // glowing parts may live on the model mesh (a child of o.group) or the group
      const ud = (o.mesh && o.mesh.userData && (o.mesh.userData.lanternBulb||o.mesh.userData.lanternBulbs)) ? o.mesh.userData
               : (o.group && o.group.userData && (o.group.userData.lanternBulb||o.group.userData.lanternBulbs)) ? o.group.userData
               : null;
      if(!ud) continue;
      // single-lantern form
      if(ud.lanternBulb){
        ud.lanternBulb.material.emissiveIntensity = lanternGlow * 1.54;
        ud.lanternLight.intensity = lanternGlow * 2.1;
      }
      // multi-bulb form (pagoda)
      if(ud.lanternBulbs){
        for(const b of ud.lanternBulbs) b.material.emissiveIntensity = lanternGlow * 1.4;
        for(const l of ud.lanternLights) l.intensity = lanternGlow * 1.6;
      }
      if(ud.lanternHalo){
        ud.lanternHalo.material.opacity = lanternGlow * 0.63;
        const base = ud.lanternBulbs ? 3.2 : 2.2;
        ud.lanternHalo.scale.set(base*flick, base*flick, 1);
      }
    }

    if(rain.visible){
      const p=rainGeo.attributes.position;
      for(let i=0;i<RAIN_N;i++){
        rainY[i] -= 30*dt;                       // fall speed
        if(rainY[i] < 0) rainY[i] = RAIN_TOP;    // recycle to the top
        const y = rainY[i];
        p.array[i*6+1] = y;                      // top vertex
        p.array[i*6+4] = y - STREAK;             // bottom vertex
      }
      p.needsUpdate=true; rain.position.x=player.position.x; rain.position.z=player.position.z;
    }

    // cloud shadows: fade in for overcast (strong) and rain (subtle), drift across
    const shadowTarget = weatherKey==='overcast' ? 0.5 : (weatherKey==='rain' ? 0.28 : 0.0);
    cloudShadows.position.x = player.position.x; cloudShadows.position.z = player.position.z;
    let shadowVisible = false;
    for(const sh of cloudShadows.children){
      sh.material.opacity += (shadowTarget*sunFactor - sh.material.opacity) * dt * 2;
      if(sh.material.opacity > 0.01) shadowVisible = true;
      sh.position.x += sh.userData.drift * dt;
      if(sh.position.x > 45) sh.position.x = -45;   // wrap
    }
    cloudShadows.visible = shadowVisible;

    // --- plant growth ---
    // rain speeds growth a touch (cosy reward for gardening in the wet)
    const growMul = rain.visible ? 1.4 : 1.0;
    for(const pl of plants){
      // pop-in scale toward this plant's full (footprint-aware) size
      const full = pl.footScale||1;
      if(pl.mesh && pl.mesh.scale.x<full){
        const ns=Math.min(full, pl.mesh.scale.x + dt*3*full);
        pl.mesh.scale.setScalar(ns);
      }
      if(!pl.ripe){
        pl.grow += dt*growMul;
        if(pl.grow >= pl.perStage){
          pl.grow = 0;
          setPlantStage(pl, pl.stage+1);
        }
      }
      if(pl.ring){               // gentle bob + spin on the gold ring
        pl.ring.rotation.z += dt*1.5;
        pl.ring.position.y = 0.06 + Math.sin(now*0.004)*0.06;
      }
    }

    // --- hovering identify icon ---
    if(hoverSprite && hoverSprite.visible && hoverPlant){
      hoverTimer -= dt;
      // float above the plant (taller offset for trees)
      const lift = (hoverPlant.footScale>1 ? 3.4 : 1.8) + Math.sin(now*0.003)*0.12;
      hoverSprite.position.set(
        hoverPlant.group.position.x,
        hoverPlant.group.position.y + lift,
        hoverPlant.group.position.z
      );
      // fade out in the last 0.6s
      hoverSprite.material.opacity = Math.min(1, hoverTimer/0.6);
      if(hoverTimer<=0){ hoverSprite.visible=false; hoverPlant=null; }
    }

    // cancel a pending remove-confirmation if the player walks off that tile
    if(pendingRemove){
      const pc = Math.floor((player.position.x + PLOT/2)/TILE);
      const pr = Math.floor((player.position.z + PLOT/2)/TILE);
      if((pc+','+pr) !== pendingRemoveKey){
        pendingRemove = null; pendingRemoveKey = null; clearPrompt();
      }
    }

    // --- wildlife ---
    maybeSpawn(dt, sunFactor > 0.15);   // active during daytime
    updateCritters(dt, now);
    updateFish(dt);

    if(promptTimer>0){
      promptTimer-=dt;
      const el=document.getElementById('prompt');
      // fixed position ~75% down the screen, horizontally centred, so it never
      // blocks the play area around the player.
      el.style.left='50%';
      el.style.top='75%';
      el.style.transform='translate(-50%,-50%)';
      if(promptTimer<=0) el.style.display='none';
    }

    renderer.render(scene,camera);
    requestAnimationFrame(tick);
  }

  scene.background=bgColor;
  generateAllIcons();          // plant icons
  generateAllBuildingIcons();  // building icons for the trade panel
  renderLibrary();
  refreshBasket();
  // a few bees already live in the grove from the start
  for(let i=0;i<3;i++) spawnCritter('bee', null);
  tick();
  setTimeout(()=>{const v=document.getElementById('veil');v.style.opacity=0;setTimeout(()=>v.remove(),800);},600);
  </script>
</body>
</html>
